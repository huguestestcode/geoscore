};

// EPCI SIRENs uniques
const EPCI_SIRENS = [...new Set(Object.values(COMMUNE_TO_EPCI))];

const DATASET_COMMUNES = 'deliberations-de-fiscalite-directe-locale-des-communes-2025-hors-taux';
const BASE_URL = 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets';

// Candidats pour le dataset EPCI (du plus probable au moins)
const EPCI_DATASET_CANDIDATES = [
  'deliberations-de-fiscalite-directe-locale-des-groupements-2025-hors-taux',
  'deliberations-de-fiscalite-directe-locale-des-epci-2025-hors-taux',
  'deliberations-de-fiscalite-directe-locale-des-groupements-de-communes-2025-hors-taux',
  'deliberations-de-fiscalite-directe-locale-des-etablissements-publics-de-cooperation-intercommunale-2025-hors-taux',
  'deliberations-de-fiscalite-directe-locale-des-groupements-a-fiscalite-propre-2025-hors-taux',
  'deliberations-de-fiscalite-directe-locale-des-epci-a-fiscalite-propre-2025-hors-taux',
  'deliberations-de-fiscalite-directe-locale-groupements-2025-hors-taux',
];

const SELECT_COMMUNES = 'depcom,libcom,bazmincfe1mt,bazmincfe2mt,bazmincfe3mt,bazmincfe4mt,bazmincfe5mt,bazmincfe6mt';
const TRANCHE_FIELDS = ['bazmincfe1mt','bazmincfe2mt','bazmincfe3mt','bazmincfe4mt','bazmincfe5mt','bazmincfe6mt'];

let outputText = '';

function setStatus(msg) { document.getElementById('status').textContent = msg; }
function setOutput(txt) { outputText = txt; document.getElementById('output').textContent = txt; }
function addLog(msg) {
  outputText += msg + '\n';
  document.getElementById('output').textContent = outputText;
}

async function fetchJson(url) {
  const res = await fetch(url);
  if (!res.ok) {
    const text = await res.text().catch(() => '');
    throw new Error(`HTTP ${res.status}: ${text.slice(0, 200)}`);
  }
  return res.json();
}

async function run() {
  const btn = document.getElementById('btn-run');
  btn.disabled = true;
  document.getElementById('btn-copy').style.display = 'none';
  setOutput('');
  outputText = '';

  try {
    // ── ÉTAPE 1 : Communes ────────────────────────────────────────────────────────
    setStatus('📡 Étape 1/3 — Chargement dataset communes...');

    const BATCH = 50;
    const allComRecords = [];
    const batches = [];
    for (let i = 0; i < ALL_CODES.length; i += BATCH) batches.push(ALL_CODES.slice(i, i + BATCH));

    for (let b = 0; b < batches.length; b++) {
      const batch = batches[b];
      setStatus(`📥 Communes batch ${b+1}/${batches.length} — ${allComRecords.length} chargées...`);
      const inClause = batch.map(c => `"${c}"`).join(',');
      const params = new URLSearchParams({
        where: `depcom IN (${inClause})`,
        select: SELECT_COMMUNES,
        limit: '100',
        offset: '0',
      });
      const data = await fetchJson(`${BASE_URL}/${DATASET_COMMUNES}/records?${params}`);
      allComRecords.push(...(data.results || []));
      if (b < batches.length - 1) await new Promise(r => setTimeout(r, 200));
    }

    setStatus(`✅ ${allComRecords.length} communes chargées. Étape 2/3 — Détection dataset EPCI...`);

    // ── ÉTAPE 2 : Trouver le dataset EPCI ────────────────────────────────────────
    let epciDataset = null;
    let epciSirenField = null;
    let epciNameField = null;

    for (const candidate of EPCI_DATASET_CANDIDATES) {
      setStatus(`🔍 Test dataset EPCI: ${candidate.slice(0, 50)}...`);
      try {
        const probe = await fetchJson(`${BASE_URL}/${candidate}/records?limit=2`);
        if (probe.results && probe.results.length > 0) {
          epciDataset = candidate;
          // Détecter les champs disponibles
          const firstRow = probe.results[0];
          const keys = Object.keys(firstRow);
          // Champ SIREN EPCI
          for (const k of ['siren','sirenepci','siren_epci','depgrp','codgeo','codepci']) {
            if (keys.includes(k)) { epciSirenField = k; break; }
          }
          // Champ nom EPCI
          for (const k of ['libepci','libgroupement','libcom','nom','libelle']) {
            if (keys.includes(k)) { epciNameField = k; break; }
          }
          addLog(`✅ Dataset EPCI trouvé: ${candidate}`);
          addLog(`   Champs détectés: ${keys.join(', ')}`);
          addLog(`   Champ SIREN: ${epciSirenField || '⚠️ non détecté — inspecter manuellement'}`);
          addLog(`   Premier enregistrement: ${JSON.stringify(firstRow, null, 2)}`);
          addLog('');
          break;
        }
      } catch(e) {
        addLog(`   ❌ ${candidate}: ${e.message.slice(0, 80)}`);
      }
      await new Promise(r => setTimeout(r, 150));
    }

    // ── ÉTAPE 3 : Requêtes EPCI (si dataset trouvé) ────────────────────────────
    const epciData = new Map(); // SIREN → record

    if (epciDataset && epciSirenField) {
      setStatus(`📡 Étape 3/3 — Chargement données EPCI (${EPCI_SIRENS.length} EPCIs)...`);

      // Batch par 20 SIRENs
      const epciSirenBatches = [];
      for (let i = 0; i < EPCI_SIRENS.length; i += 20) epciSirenBatches.push(EPCI_SIRENS.slice(i, i + 20));

      for (let b = 0; b < epciSirenBatches.length; b++) {
        const batch = epciSirenBatches[b];
        setStatus(`📥 EPCI batch ${b+1}/${epciSirenBatches.length}...`);
        const inClause = batch.map(s => `"${s}"`).join(',');
        const selectFields = [epciSirenField, epciNameField, ...TRANCHE_FIELDS].filter(Boolean).join(',');
        const params = new URLSearchParams({
          where: `${epciSirenField} IN (${inClause})`,
          select: selectFields,
          limit: '50',
          offset: '0',
        });
        try {
          const data = await fetchJson(`${BASE_URL}/${epciDataset}/records?${params}`);
          for (const r of (data.results || [])) {
            const siren = r[epciSirenField];
            if (siren) epciData.set(String(siren), r);
          }
          addLog(`   Batch EPCI ${b+1}: ${(data.results||[]).length} résultats → ${JSON.stringify(data.results||[])}`);
        } catch(e) {
          addLog(`   ❌ EPCI batch ${b+1}: ${e.message}`);
        }
        await new Promise(r => setTimeout(r, 200));
      }

      addLog(`\n✅ ${epciData.size}/${EPCI_SIRENS.length} EPCIs trouvés\n`);
    } else if (!epciDataset) {
      addLog('\n⚠️  Aucun dataset EPCI trouvé parmi les candidats testés.');
      addLog('Les communes en FPU (Lyon, Toulouse, Nantes, Lille, etc.) ne pourront pas être traitées.\n');
    } else {
      addLog('\n⚠️  Dataset EPCI trouvé mais champ SIREN non identifié automatiquement.');
      addLog('Examine le premier enregistrement ci-dessus et adapte le code.\n');
    }

    // ── Génération TypeScript ────────────────────────────────────────────────────
    setStatus('🔨 Génération TypeScript...');
    const ts = buildTS(allComRecords, epciData, epciSirenField, epciNameField, epciDataset);
    setOutput(ts);
    document.getElementById('btn-copy').style.display = 'inline-block';
    setStatus(`🎉 Terminé ! ${allComRecords.length} communes + ${epciData.size} EPCIs. Copie et colle dans taux-data.ts`);

  } catch(e) {
    setStatus(`❌ Erreur: ${e.message}`);
    addLog(`\nErreur fatale: ${e.message}`);
  }
  btn.disabled = false;
}

function copy() {
  navigator.clipboard.writeText(outputText).then(() => {
    document.getElementById('btn-copy').textContent = '✅ Copié !';
    setTimeout(() => { document.getElementById('btn-copy').textContent = '📋 Copier le TypeScript'; }, 2000);
  });
}

function extractTranches(r) {
  return TRANCHE_FIELDS.map(f => r[f] !== undefined ? r[f] : null);
}

function buildTS(comRecords, epciData, epciSirenField, epciNameField, epciDataset) {
  const lines = [];
  const date = new Date().toISOString().slice(0, 10);
  const SOURCE_COM = `'DGFiP délibérations communes 2025'`;
  const SOURCE_EPCI = `'DGFiP délibérations EPCI 2025'`;

  lines.push(`// AUTO-GÉNÉRÉ — ${date}`);
  lines.push(`// Dataset communes: ${DATASET_COMMUNES}`);
  if (epciDataset) lines.push(`// Dataset EPCI: ${epciDataset}`);
  lines.push(`// bazmincfe1mt..6mt = tranches CA: ≤10k | 10k-32.6k | 32.6k-100k | 100k-250k | 250k-500k | >500k`);
  lines.push('');

  const byCode = new Map(comRecords.map(r => [r.depcom, r]));
  const newEntries = [], nullEntries = [], epciEntries = [], notFoundEntries = [];
  const foundCodes = new Set();

  for (const code of [...ALL_CODES].sort()) {
    const r = byCode.get(code);
    if (r) {
      foundCodes.add(code);
      const nom = r.libcom || '';
      const tranches = extractTranches(r);
      const hasAny = tranches.some(t => t !== null);

      if (!hasAny) {
        // FPU ou pas de délibération — essayer l'EPCI
        const epciSiren = COMMUNE_TO_EPCI[code];
        if (epciSiren && epciData.has(epciSiren)) {
          const epciRec = epciData.get(epciSiren);
          const epciTranches = extractTranches(epciRec);
          const epciHasAny = epciTranches.some(t => t !== null);
          const epciNom = epciNameField ? (epciRec[epciNameField] || '') : epciSiren;

          if (epciHasAny) {
            const nonNull = epciTranches.filter(t => t !== null);
            const allSame = nonNull.every(v => v === nonNull[0]);
            epciEntries.push(`  // ${nom} (FPU ${epciNom})`);
            if (allSame) {
              epciEntries.push(`  '${code}': { base: ${nonNull[0]}, source: ${SOURCE_EPCI} },`);
            } else {
              const t1 = epciTranches[0] ?? nonNull[0];
              const trancheArr = `[${epciTranches.map(t => t ?? 'null').join(', ')}]`;
              epciEntries.push(`  '${code}': { base: ${t1}, source: ${SOURCE_EPCI}, tranches: ${trancheArr} },`);
            }
          } else {
            nullEntries.push(`  // ${code} ${nom} — EPCI ${epciSiren} trouvé mais base nulle aussi`);
          }
        } else if (epciSiren) {
          nullEntries.push(`  // ${code} ${nom} — FPU, EPCI ${epciSiren} non trouvé dans dataset`);
        } else {
          nullEntries.push(`  // ${code} ${nom} — pas de délibération (plancher légal)`);
        }
        continue;
      }

      const nonNull = tranches.filter(t => t !== null);
      const allSame = nonNull.every(v => v === nonNull[0]);
      newEntries.push(`  // ${nom}`);
      if (allSame) {
        newEntries.push(`  '${code}': { base: ${nonNull[0]}, source: ${SOURCE_COM} },`);
      } else {
        const t1 = tranches[0] ?? nonNull[0];
        const trancheArr = `[${tranches.map(t => t ?? 'null').join(', ')}]`;
        newEntries.push(`  '${code}': { base: ${t1}, source: ${SOURCE_COM}, tranches: ${trancheArr} },`);
      }
    } else {
      notFoundEntries.push(code);
    }
  }

  if (newEntries.length > 0) {
    lines.push('// ── COMMUNES (données directes) ──────────────────────────────────────────────');
    lines.push(...newEntries);
  }
  if (epciEntries.length > 0) {
    lines.push('');
    lines.push('// ── COMMUNES FPU (données EPCI) ──────────────────────────────────────────────');
    lines.push(...epciEntries);
  }
  if (nullEntries.length > 0) {
    lines.push('');
    lines.push('// ── SANS DÉLIBÉRATION / EPCI MANQUANT ────────────────────────────────────────');
    lines.push(...nullEntries);
  }
  if (notFoundEntries.length > 0) {
    lines.push('');
    lines.push(`// ── INTROUVABLES dans l'API communes (${notFoundEntries.length}) ──────────────`);
    lines.push(`// ${notFoundEntries.join(', ')}`);
  }

  const withBase = [...newEntries, ...epciEntries].filter(l => l.trim().startsWith("'")).length;
  lines.push('');
  lines.push(`// RÉSUMÉ: ${withBase} entrées avec base, ${nullEntries.length} sans base, ${notFoundEntries.length} introuvables`);
  return lines.join('\n');
}
